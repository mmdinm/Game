<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おにぎり具当てゲーム</title>
<style>
body{margin:0;font-family:sans-serif;background:radial-gradient(circle,#111,#000);color:#fff;text-align:center;overflow:hidden}


#startBtn{padding:15px 40px;font-size:20px;border:none;border-radius:10px;cursor:pointer}

#game{display:block}

.onigiri{width:300px;height:280px;margin:10px auto;position:relative}
.rice{width:100%;height:100%;background:radial-gradient(circle,#fff,#ddd);clip-path:polygon(50% 5%,95% 95%,5% 95%);border-radius:40px;display:flex;align-items:center;justify-content:center}

.filling img{width:100px;opacity:0;transform:scale(.5);transition:.5s}
.filling.show img{opacity:1;transform:scale(1)}

.nori{position:absolute;bottom:35px;left:50%;transform:translateX(-50%);width:80px;height:90px;background:#000;border-radius:6px;transition:.5s}
.nori.open{transform:translate(-50%,120px);opacity:0}

button{margin:10px;padding:10px 20px}

#jumpscare{position:fixed;inset:0;background:#000;display:flex;justify-content:center;align-items:center;opacity:0}
#jumpscare.show{opacity:1}

#clear{position:fixed;inset:0;background:#fff;color:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0}
#clear.show{opacity:1}
</style>
</head>
<body>



<div id="game">
<h2>具を当てろ！</h2>
<div class="onigiri">
<div class="rice"><div id="filling" class="filling"></div></div>
<div id="nori" class="nori"></div>
</div>
<div id="choices"></div>
<div id="result"></div>
<div id="score"></div>
<div id="level"></div>

</div>

<div id="jumpscare"><h1>😱</h1></div>

<div id="clear">
<h1>おめでとう！！</h1>
<div id="title"></div>
</div>

<script>
const imgs={"鮭":"https://upload.wikimedia.org/wikipedia/commons/3/3a/Grilled_salmon.jpg","ツナ":"https://upload.wikimedia.org/wikipedia/commons/0/0b/Tuna_fish.jpg","梅":"https://upload.wikimedia.org/wikipedia/commons/3/32/Umeboshi.jpg","昆布":"https://upload.wikimedia.org/wikipedia/commons/0/05/Kombu.jpg","明太子":"https://upload.wikimedia.org/wikipedia/commons/0/0c/Mentaiko.jpg","おかか":"https://upload.wikimedia.org/wikipedia/commons/2/2c/Katsuobushi.jpg","？？？":"https://upload.wikimedia.org/wikipedia/commons/8/89/Black_square.jpg"};

let base=[["鮭","ツナ"],["梅","昆布"],["明太子","おかか"]];
let score=0,level=1,count=0;
let current,correct;

// タイトル画面削除のため自動開始
window.onload=()=>{ next(); }

 
 },1000);
}

function ){end();return}
 result.textContent="";
 filling.classList.remove("show");
 filling.innerHTML="";
 nori.classList.remot=[...base];
 if(level>=2) list.push(["？？？","鮭"]);
 if(level>=3) list.push(["？？？","？？？"]);

 current=list[Math.floor(Math.random()*list.length)];
 correct=current[Math.floor(Math.random()*2)];

 let img=document.createElement("img");
 img.src=imgs[correct];
 filling.appendChild(img);

 choices.innerHTML="";
 current.forEach(c=>{
  let b=document.createElement("button");
  b.textContent=c;
  b.onclick=()=>check(c);
  choices.appendChild(b);
 });

 
}

function reveal(){
 nori.classList.add("open");
 setTimeout(()=>filling.classList.add("show"),300);
}

function jumpscare(){
 jumpscareEl.classList.add("show");
 setTimeout(()=>jumpscareEl.classList.remove("show"),500);
}

function check(choice){
 
 reveal();

 if(choice===correct){result.textContent="正解";score++;}
 else{result.textContent="不正解";score--;jumpscare();}

 count++;
 if(count%3===0) level++;

 scoreEl.textContent="スコア:"+score;
 levelEl.textContent="Lv:"+level;

 setTimeout(next,2000);
}

function end(){
 clearEl.classList.add("show");
 let t="初心者";
 if(score>=8)t="マスター";
 else if(score>=5)t="中級者";
 title.textContent="称号:"+t;
}

const filling=document.getElementById("filling");
const nori=document.getElementById("nori");
const choices=document.getElementById("choices");
const result=document.getElementById("result");
const scoreEl=document.getElementById("score");
const levelEl=document.getElementById("level");
const jumpscareEl=document.getElementById("jumpscare");
const clearEl=document.getElementById("clear");

</script>
</body>
</html>
