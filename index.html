<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おにぎり具当てゲーム 完成版</title>
<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: radial-gradient(circle, #111, #000);
    color: white;
    text-align: center;
    overflow: hidden;
  }

  h1 {
    margin-top: 10px;
    letter-spacing: 2px;
  }

  #game { padding-top: 10px; }

  .onigiri {
    width: 300px;
    height: 280px;
    margin: 10px auto;
    position: relative;
    transition: transform 0.3s;
  }

  .onigiri:hover {
    transform: scale(1.05);
  }

  .rice {
    width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 30%, #fff, #e0e0e0);
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    box-shadow: 0 20px 40px rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .filling img {
    width: 100px;
    height: 100px;
    object-fit: contain;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.5s;
  }

  .filling.show img {
    opacity: 1;
    transform: scale(1);
  }

  .nori {
    position: absolute;
    bottom: 35px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 90px;
    background: linear-gradient(#111, #000);
    border-radius: 6px;
    transition: all 0.6s ease;
  }

  .nori.open {
    transform: translate(-50%, 140px) rotate(20deg);
    opacity: 0;
  }

  button {
    margin: 10px;
    padding: 12px 25px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    background: #222;
    color: white;
    transition: 0.2s;
  }

  button:hover {
    background: #444;
    transform: scale(1.05);
  }

  #result {
    margin-top: 10px;
    font-size: 22px;
    min-height: 30px;
  }

  #score {
    margin-top: 5px;
    font-size: 16px;
    color: #aaa;
  }

  #jumpscare {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
  }

  #jumpscare.show { opacity: 1; }

  .face {
    width: 400px;
    height: 400px;
  }

  .shake {
    animation: shake 0.1s infinite;
  }

  @keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(10px,-10px); }
    50% { transform: translate(-10px,10px); }
    75% { transform: translate(10px,10px); }
    100% { transform: translate(0,0); }
  }
</style>
</head>
<body>

<div id="game">
  <h1>おにぎりの具、当てられる？</h1>

  <div class="onigiri">
    <div class="rice">
      <div class="filling" id="filling"></div>
    </div>
    <div class="nori" id="nori"></div>
  </div>

  <div id="choices"></div>
  <div id="result"></div>
  <div id="score">スコア: 0</div>
</div>

<div id="jumpscare">
  <svg class="face" viewBox="0 0 200 200">
    <circle cx="100" cy="100" r="90" fill="black" stroke="white" stroke-width="3"/>
    <circle cx="70" cy="80" r="20" fill="white"/>
    <circle cx="130" cy="80" r="20" fill="white"/>
    <circle cx="70" cy="80" r="8" fill="black"/>
    <circle cx="130" cy="80" r="8" fill="black"/>
    <ellipse cx="100" cy="140" rx="50" ry="25" fill="white"/>
  </svg>
</div>

<script>
const fillingImages = {
  "鮭": "https://upload.wikimedia.org/wikipedia/commons/3/3a/Grilled_salmon.jpg",
  "ツナ": "https://upload.wikimedia.org/wikipedia/commons/0/0b/Tuna_fish.jpg",
  "梅": "https://upload.wikimedia.org/wikipedia/commons/3/32/Umeboshi.jpg",
  "昆布": "https://upload.wikimedia.org/wikipedia/commons/0/05/Kombu.jpg",
  "明太子": "https://upload.wikimedia.org/wikipedia/commons/0/0c/Mentaiko.jpg",
  "おかか": "https://upload.wikimedia.org/wikipedia/commons/2/2c/Katsuobushi.jpg",
  "？？？": "https://upload.wikimedia.org/wikipedia/commons/8/89/Black_square.jpg"
};

const fillings = [
  ["鮭", "ツナ"],
  ["梅", "昆布"],
  ["明太子", "おかか"],
  ["？？？", "鮭"]
];

let score = 0;
let current, correct;

function nextRound() {
  document.getElementById("result").textContent = "";
  document.body.classList.remove("shake");

  const fillingEl = document.getElementById("filling");
  const nori = document.getElementById("nori");

  fillingEl.classList.remove("show");
  fillingEl.innerHTML = "";
  nori.classList.remove("open");

  current = fillings[Math.floor(Math.random() * fillings.length)];
  correct = current[Math.floor(Math.random() * 2)];

  const img = document.createElement("img");
  img.src = fillingImages[correct];
  fillingEl.appendChild(img);

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  current.forEach(choice => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.onclick = () => check(choice);
    choicesDiv.appendChild(btn);
  });
}

function reveal() {
  document.getElementById("nori").classList.add("open");
  setTimeout(() => {
    document.getElementById("filling").classList.add("show");
  }, 300);
}

function jumpscare() {
  const scare = document.getElementById("jumpscare");
  scare.classList.add("show");
  document.body.classList.add("shake");

  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.type = "sawtooth";
  osc.frequency.setValueAtTime(1000, ctx.currentTime);
  osc.connect(ctx.destination);
  osc.start();

  setTimeout(() => {
    osc.stop();
    scare.classList.remove("show");
    document.body.classList.remove("shake");
  }, 800);
}

function check(choice) {
  const result = document.getElementById("result");

  reveal();

  if (choice === correct) {
    result.textContent = "正解！🍙";
    score++;
  } else {
    result.textContent = "…間違えた";
    score = Math.max(0, score - 1);

    // 間違えたら毎回ホラー演出
    setTimeout(jumpscare, 400);
  }

  document.getElementById("score").textContent = "スコア: " + score;

  setTimeout(nextRound, 3000);
}

nextRound();
</script>

</body>
</html>
