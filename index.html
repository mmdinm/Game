<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おにぎり具当てゲーム（ホラー強化）</title>
<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: black;
    color: white;
    text-align: center;
    overflow: hidden;
  }

  #game { padding-top: 40px; }

  .onigiri {
    width: 150px;
    height: 150px;
    margin: 20px auto;
    position: relative;
  }

  .rice {
    width: 100%; height: 100%;
    background: white;
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
  }

  .nori {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px; height: 40px;
    background: black;
  }

  button {
    margin: 10px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
  }

  #result { margin-top: 20px; font-size: 20px; }

  /* ホラー演出 */
  #jumpscare {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s;
  }

  #jumpscare.show {
    opacity: 1;
  }

  .face {
    width: 300px;
    height: 300px;
  }

  @keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(5px,-5px); }
    50% { transform: translate(-5px,5px); }
    75% { transform: translate(5px,5px); }
    100% { transform: translate(0,0); }
  }

  .shake {
    animation: shake 0.2s infinite;
  }
</style>
</head>
<body>

<div id="game">
  <h1>おにぎりの具、当てられる？</h1>

  <div class="onigiri">
    <div class="rice"></div>
    <div class="nori"></div>
  </div>

  <div id="choices"></div>
  <div id="result"></div>
</div>

<!-- ジャンプスケア -->
<div id="jumpscare">
  <svg class="face" viewBox="0 0 200 200">
    <circle cx="100" cy="100" r="90" fill="black" stroke="white" stroke-width="3"/>
    <circle cx="70" cy="80" r="15" fill="white"/>
    <circle cx="130" cy="80" r="15" fill="white"/>
    <circle cx="70" cy="80" r="5" fill="black"/>
    <circle cx="130" cy="80" r="5" fill="black"/>
    <ellipse cx="100" cy="130" rx="40" ry="20" fill="white"/>
  </svg>
</div>

<script>
const fillings = [
  ["鮭", "ツナ"],
  ["梅", "昆布"],
  ["明太子", "おかか"],
  ["？？？", "鮭"]
];

let current;
let correct;

function nextRound() {
  document.getElementById("result").textContent = "";
  document.body.classList.remove("shake");

  current = fillings[Math.floor(Math.random() * fillings.length)];
  correct = current[Math.floor(Math.random() * 2)];

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  current.forEach(choice => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.onclick = () => check(choice);
    choicesDiv.appendChild(btn);
  });
}

function jumpscare() {
  const scare = document.getElementById("jumpscare");
  scare.classList.add("show");
  document.body.classList.add("shake");

  // ビープ音（簡易）
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.type = "sawtooth";
  osc.frequency.setValueAtTime(800, ctx.currentTime);
  osc.connect(ctx.destination);
  osc.start();

  setTimeout(() => {
    osc.stop();
    scare.classList.remove("show");
    document.body.classList.remove("shake");
  }, 600);
}

function check(choice) {
  const result = document.getElementById("result");

  if (choice === correct) {
    result.textContent = "正解！🍙";
  } else {
    result.textContent = "…間違えた";

    if (correct === "？？？") {
      result.textContent = "見つかっちゃったね";
      jumpscare();
    }
  }

  setTimeout(nextRound, 2000);
}

nextRound();
</script>

</body>
</html>
